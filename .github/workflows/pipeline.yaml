name: CI/CD pipeline

on:
  push:
    branches: ["main"]

jobs:
  test:
    name: run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          mkdir -p reports
          npx vitest run --coverage --reporter=junit --outputFile=reports/junit.xml

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/junit.xml
            coverage/**
          if-no-files-found: warn

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest .

      - name: Docker image push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            cd ~/world-cup-poll-backend

            git fetch origin
            git reset --hard origin/main

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  generate-email-content:
    needs: [test, build, docker, deploy]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.email.outputs.subject }}
      html_body: ${{ steps.email.outputs.html_body }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate email
        id: email
        run: |
          node .github/scripts/generate-pipeline-email-content.mjs

          echo "subject<<EOF" >> $GITHUB_OUTPUT
          cat .artifacts/email/subject.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "html_body<<EOF" >> $GITHUB_OUTPUT
          cat .artifacts/email/body.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  notification:
    runs-on: ubuntu-latest
    if: always()
    needs: generate-email-content

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v6
        with:
          subject: ${{ needs.generate-email-content.outputs.subject }}
          html_body: ${{ needs.generate-email-content.outputs.html_body }}
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}