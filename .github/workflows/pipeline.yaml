name: CI/CD pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          mkdir -p reports
          npx vitest run --coverage --reporter=junit --outputFile=reports/junit.xml

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/junit.xml
            coverage/**
          if-no-files-found: warn

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest .

      - name: Docker image push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            cd ~/world-cup-poll-backend

            git fetch origin
            git reset --hard origin/main

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  generate-email-content:
    name: Generate notification email content
    runs-on: ubuntu-latest
    needs: [test, build, docker, deploy]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: .artifacts/test-reports

      - name: Generate email subject and HTML body
        env:
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          TEST_ARTIFACTS_DIR: .artifacts/test-reports
          EMAIL_OUTPUT_DIR: .artifacts/email
        run: node .github/scripts/generate-pipeline-email-content.mjs

      - name: Upload email content artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-content
          path: .artifacts/email
          if-no-files-found: error

  notification:
    name: Pipeline notification
    runs-on: ubuntu-latest
    needs: generate-email-content
    if: always()

    steps:
      - name: Download email content artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: email-content
          path: .artifacts/email

      - name: Read email content files
        id: email_content
        shell: bash
        run: |
          {
            echo "subject<<EOF"
            cat .artifacts/email/subject.txt
            echo "EOF"
            echo "html_body<<EOF"
            cat .artifacts/email/pipeline-notification.html
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send notification email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email_content.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          html_body: ${{ steps.email_content.outputs.html_body }}
