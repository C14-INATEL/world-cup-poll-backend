name: CI/CD pipeline

on:
  push:
    branches: ["main"]

jobs:
  test:
    name: run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest .

      - name: Docker image push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            docker stop world-cup-poll-backend || true
            docker rm world-cup-poll-backend || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest

            docker run -d \
              -p 3333:3333 \
              --name world-cup-poll-backend \
              ${{ secrets.DOCKERHUB_USERNAME }}/world-cup-poll-backend:latest

  # Secrets necessários no repositório:
  #   MAIL_SERVER   → ex: smtp.gmail.com
  #   MAIL_USERNAME → seu e-mail
  #   MAIL_PASSWORD → senha de app do Gmail
  #   MAIL_TO       → destinatário

  notification:
    name: Notification
    runs-on: ubuntu-latest

    steps:
      - name: Send e-mail notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: World Cup Poll CI <${{ secrets.MAIL_USERNAME }}>
          subject: "[${{ job.status == 'success' && 'OK' || 'FALHA' }}] Pipeline - ${{ github.ref_name }} #${{ github.run_number }}"
          body: |
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Executado por: ${{ github.actor }}

            Status: ${{ job.status }}

            Veja a execução completa em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
