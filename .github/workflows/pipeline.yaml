name: World Cup Poll Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permissões necessárias para o job de deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7


  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run --reporter=junit --outputFile=./test-results/junit.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload raw test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7


  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7


  # Secrets necessários no repositório:
  #   MAIL_SERVER   → ex: smtp.gmail.com
  #   MAIL_USERNAME → seu e-mail
  #   MAIL_PASSWORD → senha de app do Gmail
  #   MAIL_TO       → destinatário
  
  notification:
    name: Notification
    needs: coverage
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send e-mail notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: World Cup Poll CI <${{ secrets.MAIL_USERNAME }}>
          subject: "[${{ job.status == 'success' && 'OK' || 'FALHA' }}] Pipeline - ${{ github.ref_name }} #${{ github.run_number }}"
          body: |
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Executado por: ${{ github.actor }}

            Status: ${{ job.status }}

            Veja a execução completa em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}


  deploy-site:
    name: Deploy Site to GitHub Pages
    needs: [ test, coverage ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate coverage report (HTML)
        run: npm run coverage

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
